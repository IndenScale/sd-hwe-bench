- commit: c08
  step: 8
  summary: 链路预算计算：覆盖半径推导
  task_type: comprehensive
  difficulty: hard
  requirement: "基于天线参数和设备规格，完成基站链路预算计算。\n\n1. 使用 Okumura-Hata 模型（docs/site-design-spec.md\
    \ §9.2）计算 1950MHz 下的路径损耗。\n   参数：基站天线高度 hb=35m，移动台高度 hm=1.5m，中心频率 f=1950MHz。\n\
    \n2. 计算链路预算（§9.1）：\n   - EIRP = Ptx + Gtx - Ltx = 40 + 18 - 3.4 = 54.6 dBm\n \
    \  - 50m 馈线在 1950MHz 损耗：取 2100MHz 和 1800MHz 损耗线性插值\n   - 最大允许路径损耗 = EIRP + Grx\
    \ - Lrx - (-102) - 10 = 151.2 dB\n\n3. 反推覆盖半径：用 Okumura-Hata 公式，满足边缘信号 ≥ -92 dBm（margin\
    \ ≥ 10dB）\n\n4. 生成 reports/link-budget.yaml，包含三个扇区的发射/接收/路径损耗/覆盖半径。\n\n查阅 docs/site-design-spec.md\
    \ §9 链路预算。注意：对数计算使用 log10。"
  expected_files:
  - reports/link-budget.yaml
  expected_deliverables: []
