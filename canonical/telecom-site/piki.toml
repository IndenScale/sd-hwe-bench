[project]
name = "canonical-telecom-site"
version = "1.0.0"
description = "Canonical outdoor telecom base-station site: tower, outdoor cabinet, RRU/antennas, DC power, grounding."

[plugins]
enabled = ["telecom"]

[plugins.telecom]
power_threshold = 0.8
rack_usage_threshold = 0.8

[generators]
enabled = ["bom-csv", "power-budget", "port-map", "cable-list"]

[generators.dist]
root = "dist"

[generators.dist.targets]
bom-csv = "采购清单"
power-budget = "设计评审"
port-map = "设计评审"
cable-list = "采购清单"
