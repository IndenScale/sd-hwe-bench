    1. 声明双路三相 PDU（A/B 路，22.08kW，4 个 IEC-C14 输出口）

    2. 声明两台计算节点 COMP-A01-01/02（2U，500W，双电源冗余）

    3. 布局：PDU 在 U40/U41，计算节点在 U10/U13

    4. 创建 rack-mount 配合

    5. 创建双路电源配合（A 路 PDU→power-a，B 路 PDU→power-b）

