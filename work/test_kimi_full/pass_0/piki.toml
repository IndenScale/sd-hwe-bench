[project]
name = "01-telecom-expansion"
version = "1.0.0"
description = "电信机架示例：PDU 功率检查 + U 位冲突检查"

[plugins]
enabled = ["telecom"]

[plugins.telecom]
power_threshold = 0.4
rack_usage_threshold = 0.8

[generators]
enabled = ["bom-csv", "rack-face-panel-svg", "power-budget", "cable-list", "port-map"]

[generators.dist]
root = "dist"

[generators.dist.targets]
bom-csv = "采购清单"
rack-face-panel-svg = "施工图"
power-budget = "设计评审"
cable-list = "采购清单"
port-map = "设计评审"
