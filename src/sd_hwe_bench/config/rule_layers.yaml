# Mapping from piki rule IDs to SD-HWE-Bench scoring layers.
#
# L2 has been split into sub-layers for finer-grained scoring:
#   L2a = identity & referential integrity (REFS, FK, TELECOM-FK)
#   L2b = interface & port compatibility (INTERFACE, TELECOM-PORT, TELECOM-CONN)
#   L2c = mate & catalog constraints (MATE, CATALOG, TAGS)
#
# ``exact`` is used for stable, well-known rules.
# ``prefixes`` are tried in order when a rule is not in ``exact``.
# Unknown rules default to L2a with a warning.
exact:
  SCHEMA-001: L1
  TELECOM-POWER-001: L3
  TELECOM-POWER-002: L3
  CATALOG-LIFECYCLE-001: L3
  TELECOM-RACK-001: L4
  TELECOM-RACK-002: L4
  TELECOM-RACK-003: L4
  TELECOM-COLLISION-001: L4
  # L2a: identity & referential integrity
  REFS-001: L2a
  REFS-002: L2a
  FK-001: L2a
  TELECOM-FK-001: L2a
  TAGS-001: L2a
  # L2b: interface & port compatibility
  INTERFACE-COMPAT-001: L2b
  INTERFACE-CABLE-001: L2b
  TELECOM-PORT-001: L2b
  TELECOM-PORT-002: L2b
  TELECOM-CONN-001: L2b
  TELECOM-CONN-002: L2b
  TELECOM-CONN-003: L2b
  # L2c: mate & catalog constraints
  MATE-001: L2c
  MATE-002: L2c
  MATE-003: L2c
  CATALOG-001: L2c
  CATALOG-002: L2c

prefixes:
  - prefix: SCHEMA-
    layer: L1
  - prefix: TELECOM-POWER-
    layer: L3
  - prefix: TELECOM-RACK-
    layer: L4
  - prefix: TELECOM-COLLISION-
    layer: L4
  - prefix: TELECOM-FK-
    layer: L2a
  - prefix: TELECOM-PORT-
    layer: L2b
  - prefix: TELECOM-CONN-
    layer: L2b
  - prefix: REFS-
    layer: L2a
  - prefix: FK-
    layer: L2a
  - prefix: TAGS-
    layer: L2a
  - prefix: INTERFACE-
    layer: L2b
  - prefix: MATE-
    layer: L2c
  - prefix: CATALOG-
    layer: L2c
