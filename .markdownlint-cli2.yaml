# Markdownlint-cli2 configuration for SD-HWE-Bench
# Lints all project Markdown except generated / dependency / runtime output dirs.
config:
  .markdownlint.yaml
globs:
  - "**/*.md"
  - "!.venv"
  - "!.pytest_cache"
  - "!.ruff_cache"
  - "!node_modules"
  - "!dist"
  - "!papers/**/dist"
  - "!papers/**/node_modules"
  - "!canonical/**/node_modules"
  - "!site"
  - "!logs"
  - "!runs"
  - "!work"
  - "!datasets"
  - "!jobs"
  - "!results"
