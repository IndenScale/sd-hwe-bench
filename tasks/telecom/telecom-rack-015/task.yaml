task_type: comprehensive
difficulty: hard
requirement: '为电信机柜集群扩展第二个机柜 RACK-A02，在其中部署服务器 SRV-03，并通过光纤将其连接到 RACK-A01 中的交换机 SW-01。


  要求：

  1. 声明 RACK-A02（standard-rack，位置 机房A-B列）

  2. 声明 PDU-C（挂载到 RACK-A02，容量 2000W，两个 IEC-C14 输出口）

  3. 声明服务器 SRV-03（generic-server，2U，300W TDP）并分配到 RACK-A02 U25，接入 PDU-C

  4. 为 SRV-03 的 eth0/eth1/power-a 和 SW-01 新增的 Gi1/0/3 声明端口实例

  5. 为 SRV-03 eth0 和 SW-01 Gi1/0/3 声明 SFP28-SR 光模块

  6. 建立跨机柜光纤连接 CONN-S03-SW01（SRV-03 eth0 → SW-01 Gi1/0/3），光纤长度 5.0m

  7. 创建所有必要的配合（rack-mount, sfp28-cage, lc-connector, power-iec）


  设计规范：查阅 docs/rack-design-spec.md。特别注意 §1 机柜布局中的 U 位规则、

  §2 PDU 字段规范（capacity_w 而非 capacity_w，rack_id 必填）、

  §4-§8 端口/光模块/光纤/连接/配合的规范。

  跨机柜光纤使用 5.0m OM4-LC-LC。'
