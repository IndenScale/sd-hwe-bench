title: "Engineering as Code: 将软件工程方法引入工程设计"
author: "宋涤非"
institute: "华信咨询设计研究院有限公司，杭州 310052"
abstract: |
  大语言模型在代码生成、数学推理与芯片设计等可验证领域已取得显著进展，但在建筑、机械、暖通等传统工程领域的设计生成任务上仍表现有限。本文提出，该差距的主要根源并非模型能力本身，而在于工程领域缺乏一种可被机器直接消费、验证与版本化的设计表示，即 "Design as Code" 形式的可计算基础。现有 CAD/BIM 系统将设计逻辑与几何表示深度耦合，导致质量保证活动向设计流程末端严重偏移；而主流的自动合规检查（ACC）方法不仅只能在设计完成后进行逆向审查，还面临几何碰撞假阳性泛滥和命名依赖导致的高成本翻模问题。这些缺陷的根源不在算法，而在于几何模型无法编码"这条管道是否应该穿过这堵墙"的语义信息。
  
  本文系统提出 **Engineering as Code（EaC）** 范式，将工程设计表达为文本原生的声明式语言，并以自动规则引擎、版本控制与包管理作为质量门与协作基座。本文的核心贡献包括三项：（1）提出**信息表示假说**，系统论证工程 AI 瓶颈的根源在于传统工程领域缺乏 "Design as Code" 形式的可计算基础；（2）提出 **ADL（Assembly Definition Language）** 设计语言，以 **Part** 为基本原子，通过 **PDL（Part Definition Language）**、**PML（Part Mating Language）**、**PLL（Part Layout Language）** 三层正交子语言分别描述部件类型、部件间关系与空间布局；（3）提出**工程设计的静态分析（ESA）** 机制，将合规性规则从下游审查前移到设计生成阶段——与模型 ACC 不同，ESA 检查的是设计声明而非几何实例化产物，因此不受假碰撞和命名依赖的困扰，并给出规则可豁免、聚焦底线规则、净化协作信噪比、AI 辅助规则库建设四条操作性纲领。
keywords: "Engineering as Code；Design as Code；声明式设计；ADL；Engineering Static Analysis；信息表示假说；RLVR"
