title: "Engineering as Code: Bringing Software Engineering Methodology to Engineering Design"
author: "Song Difei"
institute: "Huaxin Consulting, Design, and Research Institute"
city: "Hangzhou"
country: "China"
abstract: |
  Large language models have made significant progress in verifiable domains such as code generation, mathematical reasoning, and chip design, yet they remain limited on design generation tasks in traditional engineering fields like architecture, mechanical engineering, and HVAC. This paper argues that the root cause of this gap is not model capability per se, but rather the absence in engineering domains of a computable foundation in the form of "Design as Code" — a design representation that can be directly consumed, verified, and versioned by machines. Existing CAD/BIM systems deeply couple design logic with geometric representation, causing quality assurance activities to be severely shifted toward the tail end of the design process. Mainstream Automated Compliance Checking (ACC) methods not only can only perform retrospective review after design completion, but also suffer from an epidemic of false positives in geometric clash detection and high-cost model reconstruction problems caused by naming dependencies. The root of these deficiencies lies not in the algorithms, but in the inability of geometric models to encode the semantic information of "whether this pipe should pass through this wall."
  
  This paper systematically proposes the **Engineering as Code (EaC)** paradigm, which expresses engineering design as a text-native declarative language, with an automated rule engine, version control, and package management serving as the quality gate and collaboration foundation. The core contributions of this paper are threefold: (1) proposing the **Information Representation Hypothesis**, which systematically argues that the bottleneck of engineering AI lies in the absence of a computable foundation in the form of "Design as Code" in traditional engineering domains; (2) proposing the **ADL (Assembly Definition Language)** design language, which takes the **Part** as the fundamental atom and describes component types, inter-component relationships, and spatial layout through three orthogonal sub-languages: **PDL (Part Definition Language)**, **PML (Part Mating Language)**, and **PLL (Part Layout Language)**; (3) proposing the **Engineering Static Analysis (ESA)** mechanism, which shifts compliance rules from downstream review to the design generation stage — unlike model ACC, ESA inspects design declarations rather than geometrically instantiated artifacts, and is therefore unencumbered by false collisions and naming dependencies, along with four operational guidelines: rule waivability, focusing on bottom-line rules, purifying collaboration signal-to-noise ratio, and AI-assisted rule library construction.
keywords: "Engineering as Code; Design as Code; Declarative Design; ADL; Engineering Static Analysis; Information Representation Hypothesis; Reinforcement Learning with Verifiable Rewards (RLVR)"
