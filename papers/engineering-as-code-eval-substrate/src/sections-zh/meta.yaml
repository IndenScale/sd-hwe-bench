title: "Engineering as Code: An Executable Evaluation Substrate for Engineering Agents"
subtitle: "Bridging Representation, Constraint, and Knowledge Gaps in AI Data Center Design"
authors:
  - name: "IndenScale"
    affiliation: "IndenScale"
abstract: |
  大语言模型和 Agent 系统在软件工程、数学推理与开放域工具使用中快速进步，但系统级工程设计尚未形成类似代码任务的高频评估闭环。本文主张，工程 agents 的瓶颈不能只归结为模型能力；更基础的问题，是缺少一种可提交、可检查、可诊断、可修复、可优化的 evaluation substrate。我们提出 Engineering as Code (EaC) 作为面向工程 agents 的可执行评估底座：用文本原生的工程设计语言表示对象、连接、布局、调度和交付物；用分层 critic 执行语法、schema、引用、静态约束、动态模型、几何与可建造性检查；用结构化诊断支持 repair loop；并将设备曲线、气候、电价、成本和施工风险等情境化知识纳入优化目标。本文以 AI Data Center Design 作为 reference domain，分析 EaC 如何 bridge representation, constraint, and knowledge gaps。我们设计三组实验：比较不同表征路径的闭环能力；比较自然语言规范、文档规范和可执行约束下的 pseudo-correctness 与 repair 饱和行为；通过 AIDC 设计-调度联合优化 probe 观察可优化知识是否推动 Pareto frontier 外移。本文的目标不是展示一个更大的任务集，而是提出一种可复现、可诊断、可扩展的工程 agent 评估底座。
keywords:
  - Engineering as Code
  - Engineering AI
  - Engineering Agents
  - Evaluation
  - Executable Evaluation
  - Representation Gap
  - Constraint Gap
  - Knowledge Gap
  - AI Data Center Design
  - SD-HWE-Bench
